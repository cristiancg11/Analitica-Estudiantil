<div class="dashboard-page">
  <div class="dashboard-container fade-in">
    
    <header class="dashboard-header">
      
      <button class="back-button" (click)="goToHome()">
        <span class="icon">←</span> Volver al inicio
      </button>

      <div class="header-text">
        <h1 class="dashboard-title">
          Dashboard Analítico de Deserción Estudiantil
        </h1>

        <p class="dashboard-description">
          Este tablero interactivo consolida información demográfica,
          académica y socioeconómica para identificar patrones de abandono
          estudiantil en la Universidad Nacional de Colombia (UNAL).
        </p>
      </div>

    </header>

    <main class="dashboard-content">

      <div class="iframe-card">

        <iframe 
          [src]="url"
          class="powerbi-iframe"
          frameborder="0"
          allowFullScreen="true">
        </iframe>

      </div>

    </main>

  </div>
</div>
